<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>silding-glass-panels-solo-form</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app">
      <main class="mx-auto flex w-[min(90%,1320px)] flex-col gap-6 md:gap-10 px-3">
        <section class="flex flex-col gap-6">
          <img
            class="w-full object-fill rounded-2xl h-[260px] md:h-[360px] mt-10 shadow-lg"
            src="/images/andy-sliding-glass-image1.jpg"
            alt="sliding glass enclosure"
          >

          <form id="dealerForm" class="mx-auto w-full max-w-xl rounded-2xl borde border-black/10 bg-white p-6 shadow-sm">
            <div class="grid gap-4 sm:grid-cols-2">
              <label class="grid gap-1">
                <span class="text-sm font-medium">First name</span>
                <input name="firstName" required class="h-11 rounded-xl border border-black/10 px-3" />
              </label>

              <label class="grid gap-1">
                <span class="text-sm font-medium">Last name</span>
                <input name="lastName" required class="h-11 rounded-xl border border-black/10 px-3" />
              </label>
            </div>

            <div class="mt-4 grid gap-4 sm:grid-cols-2">
              <label class="grid gap-1">
                <span class="text-sm font-medium">Email</span>
                <input name="email" type="email" required class="h-11 rounded-xl border border-black/10 px-3" />
              </label>

              <label class="grid gap-1">
                <span class="text-sm font-medium">Phone</span>
                <input name="phone" inputmode="tel" required class="h-11 rounded-xl border border-black/10 px-3" />
              </label>
            </div>

            <div class="mt-4 grid gap-4 sm:grid-cols-2">
              <label class="grid gap-1">
                <span class="text-sm font-medium">ZIP</span>
                <input name="zip" inputmode="numeric" required class="h-11 rounded-xl border border-black/10 px-3" />
              </label>

              <label class="grid gap-1">
                <span class="text-sm font-medium">City</span>
                <input name="city" required class="h-11 rounded-xl border border-black/10 px-3" />
              </label>
            </div>

            <div class="mt-4 grid gap-4 sm:grid-cols-2">
              <label class="grid gap-1">
                <span class="text-sm font-medium">State</span>
                <select name="state" required class="h-11 rounded-xl border border-black/10 px-3">
                  <option value="">Select…</option>
                  <option>AL</option>
                  <option>AK</option>
                  <option>AZ</option>
                  <option>AR</option>
                  <option>CA</option>
                  <option>CO</option>
                  <option>CT</option>
                  <option>DE</option>
                  <option>FL</option>
                  <option>GA</option>
                  <option>HI</option>
                  <option>ID</option>
                  <option>IL</option>
                  <option>IN</option>
                  <option>IA</option>
                  <option>KS</option>
                  <option>KY</option>
                  <option>LA</option>
                  <option>ME</option>
                  <option>MD</option>
                  <option>MA</option>
                  <option>MI</option>
                  <option>MN</option>
                  <option>MS</option>
                  <option>MO</option>
                  <option>MT</option>
                  <option>NE</option>
                  <option>NV</option>
                  <option>NH</option>
                  <option>NJ</option>
                  <option>NM</option>
                  <option>NY</option>
                  <option>NC</option>
                  <option>ND</option>
                  <option>OH</option>
                  <option>OK</option>
                  <option>OR</option>
                  <option>PA</option>
                  <option>RI</option>
                  <option>SC</option>
                  <option>SD</option>
                  <option>TN</option>
                  <option>TX</option>
                  <option>UT</option>
                  <option>VT</option>
                  <option>VA</option>
                  <option>WA</option>
                  <option>WV</option>
                  <option>WI</option>
                  <option>WY</option>
                </select>
              </label>

              <label class="grid gap-1">
                <span class="text-sm font-medium">Business</span>
                <input name="business" required class="h-11 rounded-xl border border-black/10 px-3" />
              </label>
            </div>

            <button class="mt-6 h-11 w-full rounded-xl bg-blue-600 text-white font-medium">
              Submit
            </button>

            <p id="formMsg" class="mt-3 text-sm"></p>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
